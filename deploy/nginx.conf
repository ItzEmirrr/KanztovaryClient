server {
    listen       80;
    server_name  _;

    # ── Клиентское приложение (/): SPA-роутинг ─────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Хешированные ассеты кешируем навсегда; index.html — без кеша
        location ~* \.(js|css|woff2?|png|jpe?g|svg|ico|webp)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Панель администратора (/admin): dist монтируется volume'ом ─────────────
    location /admin {
        alias      /usr/share/nginx/html/admin;
        index      index.html;
        try_files  $uri $uri/ /admin/index.html;

        location ~* \.(js|css|woff2?|png|jpe?g|svg|ico|webp)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── REST API → Spring Boot ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://stationery_app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Для AI-эндпоинтов с долгим ответом
        proxy_read_timeout 30s;
    }

    # ── Загруженные файлы → Spring Boot ───────────────────────────────────────
    location /uploads/ {
        proxy_pass       http://stationery_app:8080;
        proxy_set_header Host $host;
    }

    # ── Swagger (опционально) ──────────────────────────────────────────────────
    location /swagger-ui/ {
        proxy_pass       http://stationery_app:8080;
        proxy_set_header Host $host;
    }

    location /v3/api-docs {
        proxy_pass       http://stationery_app:8080;
        proxy_set_header Host $host;
    }
}
