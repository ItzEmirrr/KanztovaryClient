server {
    listen 80;
    server_name yourdomain.com;

    # ── Admin panel ──────────────────────────────────────────────────────────
    # Built with VITE_BASE_PATH=/admin  →  copy dist/ to /var/www/admin/
    location /admin {
        alias /var/www/admin;
        try_files $uri $uri/ /admin/index.html;

        location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Client SPA ───────────────────────────────────────────────────────────
    # Built with VITE_API_URL=''  →  copy dist/ to /var/www/client/
    location / {
        root /var/www/client;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Spring Boot backend ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Uploaded files (product images etc.) ────────────────────────────────
    # Client requests /uploads/... → proxy to backend
    location /uploads/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache images aggressively on the CDN/browser side
        expires 7d;
        add_header Cache-Control "public";
    }
}
