# Полный стек: БД + бэкенд + клиент (nginx)
#
# Использование:
#   1. Скопируй .env.example → .env и заполни переменные
#   2. Собери dist админки:  cd ../StationeryClient/optimistic-gagarin/stationery-admin && npm ci && npm run build
#      Скопируй dist в deploy/admin-dist/
#   3. docker compose -f deploy/docker-compose.yml up -d --build
#
# Структура проксирования:
#   :80 /          → клиентское SPA  (встроено в образ)
#   :80 /admin     → панель админа   (bind mount: deploy/admin-dist/)
#   :80 /api/      → Spring Boot     (stationery_app:8080)
#   :80 /uploads/  → Spring Boot     (stationery_app:8080)

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: stationery_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stationery
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d stationery"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot backend ────────────────────────────────────────────────────
  app:
    build:
      context: ../../StationeryV2   # путь к папке с бэкендом
    image: stationery_app:latest
    container_name: stationery_app
    restart: unless-stopped
    # порт намеренно не пробрасывается наружу — доступен только через nginx
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL:      jdbc:postgresql://db:5432/stationery
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}
      JWT_EXPIRATION:               ${JWT_EXPIRATION:-86400000}
      ANTHROPIC_API_KEY:            ${ANTHROPIC_API_KEY}
      UPLOAD_DIR:                   /app/uploads
      ORDER_DELIVERY_FEE:           ${ORDER_DELIVERY_FEE:-0}
      ORDER_FREE_DELIVERY_THRESHOLD: ${ORDER_FREE_DELIVERY_THRESHOLD:-10000}
      KPI_LOW_STOCK_THRESHOLD:      ${KPI_LOW_STOCK_THRESHOLD:-5}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ─── Nginx + клиентское SPA ─────────────────────────────────────────────────
  web:
    build:
      context: ..          # корень клиентского проекта
      dockerfile: Dockerfile
    image: stationery_web:latest
    container_name: stationery_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # dist панели администратора — собери вручную (см. инструкцию выше)
      - ./admin-dist:/usr/share/nginx/html/admin:ro
    depends_on:
      - app

volumes:
  postgres_data:
  uploads:
